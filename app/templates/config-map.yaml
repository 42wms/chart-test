{{- if .Values.volumesConfigMap.enable }}
{{- range .Values.volumesConfigMap.volumes }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "app.name" $ }}-file-{{ .name }}
  {{- if or $.Values.annotations $.Values.configMap.annotations }}
  annotations:
    {{- with $.Values.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
    {{- with $.Values.configMap.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- end }}
  labels:
    {{- include "app.labels" $ | nindent 4 }}
    {{- with $.Values.configMap.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
data:
  {{- range .files }}
  {{ .name }}: |2
    {{- .data | nindent 4 }}
  {{- end }}
{{- end }}
{{- end }}
