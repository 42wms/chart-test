suite: role
templates:
  - role.yaml
release:
  name: app
  namespace: default
tests:
  # --- Default behaviour ---
  - it: renders nothing by default (role.create=false)
    asserts:
      - hasDocuments:
          count: 0

  # --- Base rendering when enabled ---
  - it: renders a Role and a RoleBinding when role.create=true
    set:
      role:
        create: true
        rules:
          - apiGroups: []
            resources:
              - pods
            verbs:
              - get
              - list
              - watch
    asserts:
      - hasDocuments:
          count: 2

  - it: first document is the Role with the release name
    documentIndex: 0
    set:
      role:
        create: true
        rules:
          - apiGroups: []
            resources:
              - pods
            verbs:
              - get
    asserts:
      - isKind:
          of: Role
      - isAPIVersion:
          of: rbac.authorization.k8s.io/v1
      - equal:
          path: metadata.name
          value: app
      - equal:
          path: rules[0].resources[0]
          value: pods

  - it: second document is the RoleBinding wired to the ServiceAccount
    documentIndex: 1
    set:
      role:
        create: true
        rules: []
    asserts:
      - isKind:
          of: RoleBinding
      - equal:
          path: roleRef.kind
          value: Role
      - equal:
          path: roleRef.name
          value: app
      - equal:
          path: subjects[0].kind
          value: ServiceAccount
      - equal:
          path: subjects[0].name
          value: app
      - equal:
          path: subjects[0].namespace
          value: default

  # --- Critical parameter changes ---
  - it: passes through the supplied rules verbatim
    documentIndex: 0
    set:
      role:
        create: true
        rules:
          - apiGroups:
              - apps
            resources:
              - deployments
            verbs:
              - get
              - list
    asserts:
      - equal:
          path: rules[0].apiGroups[0]
          value: apps
      - lengthEqual:
          path: rules[0].verbs
          count: 2

  - it: merges common and role annotations on both documents
    documentIndex: 0
    set:
      annotations:
        common.io/team: platform
      role:
        create: true
        rules: []
        annotations:
          rbac.io/managed: "true"
    asserts:
      - equal:
          path: metadata.annotations["common.io/team"]
          value: platform
      - equal:
          path: metadata.annotations["rbac.io/managed"]
          value: "true"
