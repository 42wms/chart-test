suite: secret
templates:
  - secret.yaml
release:
  name: app
  namespace: default
tests:
  # --- Default behaviour ---
  - it: renders nothing by default (no envSecret, no volumesSecret)
    asserts:
      - hasDocuments:
          count: 0

  # --- env Secret (requires deployment or job) ---
  - it: renders an env Secret when envSecret is set on a deployment
    set:
      deployment: true
      envSecret:
        DB_PASSWORD: s3cr3t
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Secret
      - equal:
          path: metadata.name
          value: app-env-secret
      - equal:
          path: type
          value: Opaque
      - equal:
          path: data.DB_PASSWORD
          value: czNjcjN0   # base64("s3cr3t")

  - it: env Secret is also produced for a job workload
    set:
      deployment: false
      job: true
      envSecret:
        TOKEN: abc
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: metadata.name
          value: app-env-secret

  - it: does NOT render the env Secret without a deployment or job
    set:
      deployment: false
      job: false
      envSecret:
        DB_PASSWORD: s3cr3t
    asserts:
      - hasDocuments:
          count: 0

  - it: fails when an envSecret value is empty (required guard)
    set:
      deployment: true
      envSecret:
        DB_PASSWORD: ""
    asserts:
      - failedTemplate:
          errorMessage: DB_PASSWORD value required

  # --- file Secrets via volumesSecret (independent of workload) ---
  - it: renders a file Secret from volumesSecret without any workload
    set:
      deployment: false
      job: false
      volumesSecret:
        enable: true
        volumes:
          - name: tls
            files:
              - name: cert.pem
                data: CERTDATA
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Secret
      - equal:
          path: metadata.name
          value: app-file-tls-secret
      - equal:
          path: type
          value: Opaque
      - equal:
          path: data["cert.pem"]
          value: |2 # base64("CERTDATA")
            Q0VSVERBVEE=

  - it: honors a custom file Secret type
    set:
      volumesSecret:
        enable: true
        volumes:
          - name: tls
            type: kubernetes.io/tls
            files:
              - name: tls.crt
                data: X
    asserts:
      - equal:
          path: type
          value: kubernetes.io/tls

  - it: renders both env Secret and file Secret together
    documentIndex: 0
    set:
      deployment: true
      envSecret:
        K: V
      volumesSecret:
        enable: true
        volumes:
          - name: tls
            files:
              - name: a
                data: B
    asserts:
      - hasDocuments:
          count: 2
      - equal:
          path: metadata.name
          value: app-env-secret
