suite: service-account
templates:
  - service-account.yaml
release:
  name: app
  namespace: default
tests:
  # --- Base rendering / defaults ---
  - it: creates a ServiceAccount by default (serviceAccount.create=true)
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: ServiceAccount
      - isAPIVersion:
          of: v1
      - equal:
          path: metadata.name
          value: app

  - it: renders the common chart labels
    asserts:
      - equal:
          path: metadata.labels["app.kubernetes.io/name"]
          value: app
      - equal:
          path: metadata.labels["app.kubernetes.io/managed-by"]
          value: Helm
      - equal:
          path: metadata.labels["helm.sh/chart"]
          value: app-2.2.0

  - it: has no annotations block by default
    asserts:
      - notExists:
          path: metadata.annotations
      - notExists:
          path: imagePullSecrets

  # --- Critical parameter changes ---
  - it: renders nothing when serviceAccount.create=false
    set:
      serviceAccount.create: false
    asserts:
      - hasDocuments:
          count: 0

  - it: merges common annotations with serviceAccount annotations
    set:
      annotations:
        common.io/team: platform
      serviceAccount.annotations:
        eks.amazonaws.com/role-arn: arn:aws:iam::123:role/app
    asserts:
      - equal:
          path: metadata.annotations["common.io/team"]
          value: platform
      - equal:
          path: metadata.annotations["eks.amazonaws.com/role-arn"]
          value: arn:aws:iam::123:role/app

  - it: renders imagePullSecrets when provided
    set:
      serviceAccount.imagePullSecrets:
        - name: ecr-creds
    asserts:
      - contains:
          path: imagePullSecrets
          content:
            name: ecr-creds

  - it: applies custom serviceAccount labels
    set:
      serviceAccount.labels:
        tier: backend
    asserts:
      - equal:
          path: metadata.labels.tier
          value: backend
