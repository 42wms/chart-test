  #     # runAsNonRoot: true
  #     # runAsUser: 1000
  #   image:
  #     repository: ""
  #     pullPolicy: IfNotPresent
  #     tag: ""
  #   command: []
  #   args: []
  #   envFrom: []
  #     # - secretRef:
  #     #     name: env-secret
  #     # - configMapRef:
  #     #     name: env-configmap
  #   env: {}
  #     # FOO: bar
  #     # FROM_SECRET:
  #     #   secretKeyRef:
  #     #     name: secretName
  #     #     key: secretKey
  #   ports: []
  #     # - name: http-grpc
  #     #   containerPort: 50051
  #     #   protocol: TCP
  #   lifecycle: {}
  #     # postStart:
  #     #   exec:
  #     #     command: ["sleep", "10"]
  #     # preStop:
  #     #   exec:
  #     #     command: ["sleep", "10"]
  #   livenessProbe: {}
  #   readinessProbe: {}
  #   startupProbe: {}
  #   volumeMounts: []
  #     # - name: data
  #     #   mountPath: /data
  #   workingDir: ""

# Common labels for all resources
labels: {}

lifecycle: {}
#  postStart:
#    exec:
#      command: ["sleep", "10"]
#  preStop:
#    exec:
#      command: ["sleep", "10"]

livenessProbe: {}

nodeSelector: {}

podAnnotations:
  linkerd.io/inject: enabled
  # use this construction to disable linkerd inject
  # linkerd.io/inject: disabled
  # configured log level for linkerd init container and linkerd2_proxy container
  # config.linkerd.io/proxy-log-level: warn,linkerd2_proxy=info
  # Outbound ports that should skip the proxy. Comma-separated list of values, where each value can be a port number or a range a-b
  # config.linkerd.io/skip-outbound-ports: "<port>"
  # full configuration list: https://linkerd.io/2.10/reference/proxy-configuration/

# Common labels for all pods
podLabels: {}

podSecurityContext: {}
#  fsGroup: 2000

ports: []
#  - name: http-grpc
#    containerPort: 50051
#    protocol: TCP

# priorityClassName assigns a PriorityClass, influencing scheduling order
# and preemption. The named PriorityClass must already exist in the cluster.
priorityClassName: ""

readinessProbe: {}

replicaCount: 1

# resizePolicy controls behavior for in-place resource resize (beta 1.33+).
# Per-resource: choose whether a CPU/memory change can be applied live
# or requires a container restart.
# Empty = default ("NotRequired" for cpu, "RestartContainer" for memory).
resizePolicy: []
#   - resourceName: cpu
#     restartPolicy: NotRequired
#   - resourceName: memory
#     restartPolicy: RestartContainer

# We usually recommend not to specify default resources and to leave this as a conscious
# choice for the user. This also increases chances charts run on environments with little
# resources, such as Minikube. If you do want to specify resources, uncomment the following
# lines, adjust them as necessary, and remove the curly braces after 'resources:'.
resources: {}
#  limits:
#    cpu: 100m
#    memory: 128Mi
#  requests:
#    cpu: 100m
#    memory: 128Mi

# resourceClaims references ResourceClaims/Templates for Dynamic Resource
# Allocation (e.g. GPUs, specialized hardware). Claims declared here are
# then referenced by name in a container's resources.claims.
resourceClaims: []
#   - name: gpu-claim
#     resourceClaimTemplateName: gpu-template
#   # then in the container spec:
#   #   resources:
#   #     claims:
#   #       - name: gpu-claim

# Do not restarting container after finished, used Never
restartPolicy: Never

# restartPolicyRules gives fine-grained, per-exit-code restart control
# (K8s 1.36+). Evaluated in order against the container's exit code to
# decide whether it restarts. Useful for treating specific codes as
# success/failure independently of the pod restartPolicy.
restartPolicyRules: []
#   - action: Restart
#     exitCodes:
#       operator: In
#       values:
#         - 42
#   - action: Restart
#     exitCodes:
#       operator: NotIn
#       values:
#         - 0

# Common values for role and binding
role:
  create: false
  # Common annotations for role and binding
  annotations: {}
  # Common labels for all role and binding
  labels: {}
  rules: []
#    - apiGroups:
#        - ""
#      resources:
#        - services
#      verbs:
#        - 'get'
#        - 'list'
#        - 'watch'

# runtimeClassName selects a non-default container runtime (e.g. gVisor,
# Kata Containers) for sandboxing/isolation. The RuntimeClass must exist
# in the cluster. Empty uses the default runtime.
runtimeClassName: ""
#  runtimeClassName: "gvisor"

# Common values for all secrets
secret:
  # Common annotations for all secrets
  annotations: {}
  # Common labels for all secrets
  labels: {}

securityContext: {}
#  capabilities:
#    drop:
#      - ALL
#  readOnlyRootFilesystem: true
#  runAsNonRoot: true
#  runAsUser: 1000

service:
  enable: false
  type: ClusterIP
  ports: []
#    - port: 50051
#      targetPort: 50051
#      protocol: TCP
#      name: http-grpc
  # Common annotations for service
  annotations: {}
  # Common labels for service
  labels: {}

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Common annotations for service account
  annotations: {}
  # Image pull secrets for authenticating to private container registries like AWS ECR
  imagePullSecrets: []
#    - name: container-registry-credentials
  # Common labels for service account
  labels: {}

# startupProbe gives slow-starting containers time to come up before
# liveness/readiness probes begin. While it runs, the other probes are
# disabled. failureThreshold * periodSeconds = max allowed startup time.
startupProbe: {}
#   httpGet:
#     path: /healthz
#     port: 8080
#   failureThreshold: 30
#   periodSeconds: 10
#   # # exec / tcpSocket / grpc are also supported:
#   # exec:
#   #   command:
#   #     - cat
#   #     - /tmp/ready

strategy:
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0
  type: RollingUpdate

# terminationGracePeriodSeconds is how long K8s waits after SIGTERM before
# sending SIGKILL during pod shutdown. Increase for apps needing clean
# draining (databases, queues, long requests).
# By default: 30
terminationGracePeriodSeconds: ""
#  terminationGracePeriodSeconds: 60

tolerations: []

# topologySpreadConstraints spread pods across failure domains (zones,
