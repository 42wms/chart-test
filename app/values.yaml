# installCRDs determines whether Custom Resource Definitions (CRD) are installed by the chart.
# Note that CRDs are global resources and require cluster admin privileges to install.
installCRDs: false

# list of CRDs for current app via dependence chart.
global:
  CRDs: []
# For example:
#    - apiVersion: apiextensions.k8s.io/v1
#      kind: CustomResourceDefinition
#      metadata:
#        annotations:
#          controller-gen.kubebuilder.io/version: v0.11.3
#        creationTimestamp: null
#        . . .

affinity: {}

# Common annotations for all resources
annotations: {}

args: []

# automountServiceAccountToken controls whether the SA token is auto-mounted
# into the pod. Set to false to harden pods that don't call the K8s API.
# Leave empty ("") to inherit cluster/ServiceAccount default.
automountServiceAccountToken: ""
# automountServiceAccountToken: false

# Common values for cluster role and binding
clusterRole:
  create: false
  # Common annotations for cluster role and binding
  annotations: {}
  # Common labels for all cluster role and binding
  labels: {}
  rules: []
#    - apiGroups:
#        - ""
#      resources:
#        - services
#      verbs:
#        - 'get'
#        - 'list'
#        - 'watch'

command: []

# Common values for all config maps
configMap:
  # Common annotations for all config maps
  annotations: {}
  # Common labels for all config maps
  labels: {}

# Defining deployment type as a Deployment (job must be false)
deployment: true

# dnsPolicy sets how DNS is resolved for the pod.
# Valid values: "ClusterFirst" (default), "ClusterFirstWithHostNet",
# "Default", "None". Use "None" when supplying a fully custom dnsConfig.
# When hostNetwork is true, prefer "ClusterFirstWithHostNet".
dnsPolicy: ""
# dnsPolicy: "ClusterFirstWithHostNet"

# dnsConfig provides custom DNS settings, merged with dnsPolicy (or used
# standalone when dnsPolicy is "None"). Useful for tuning ndots or adding
# extra nameservers/search domains.
dnsConfig: {}
#   nameservers:
#     - "1.1.1.1"
#   searches:
#     - "ns1.svc.cluster.local"
#   options:
#     - name: ndots
#       value: "2"
#     - name: edns0

# enableServiceLinks injects every Service in the namespace as env vars
# (Docker-link style). Defaults to true in K8s; set false to avoid env
# clutter and speed up pod startup in namespaces with many services.
# Leave empty ("") to keep the cluster default.
enableServiceLinks: ""
# enableServiceLinks: false

env: {}
#  FOO: bar
#  FROM_SECRET:
#    secretKeyRef:
#      name: secretName
#      key: secretKey

envSecret: {}

envFrom: {}
#  - secretRef:
#      name: env-secret
#  - configMapRef:
#      name: env-configmap

hostAliases: []
#  - ip: "127.0.0.1"
#    hostnames:
#      - "foo.local"
#      - "bar.local"
#  - ip: "10.1.2.3"
#    hostnames:
#      - "foo.remote"
#      - "bar.remote"

# hostIPC shares the host's IPC namespace with the pod. Only for workloads
# that need host-level shared memory (e.g. some monitoring/HPC tools).
# Security-sensitive — keep false unless required.
# By default: false
hostIPC: ""

# hostname sets an explicit hostname inside the pod instead of the
# system-assigned one. Note: with replicas > 1 all pods share this name,
# so this fits single-replica use cases.
hostname: ""

# hostnameOverride sets an arbitrary FQDN as the pod's hostname (alpha,
# K8s 1.34+). Requires the HostnameOverride feature gate to be enabled,
# otherwise the API rejects the pod. Takes precedence over hostname/subdomain.
hostnameOverride: ""

# hostNetwork attaches the pod directly to the node's network namespace.
# The pod then uses the host's IPs/ports. Security-sensitive and can cause
# port conflicts; pair with dnsPolicy "ClusterFirstWithHostNet".
# By default: false
hostNetwork: ""

# hostPID shares the host's PID namespace, making host processes visible
# inside the pod. Only for node-level agents/debuggers. Security-sensitive.
# By default: false
hostPID: ""

# hostUsers controls user-namespace isolation. Set false to enable a
# dedicated user namespace so in-container root maps to an unprivileged
# host UID (stronger isolation). Empty/true keeps host user namespace.
# By default: true
hostUsers: ""

image:
  repository: ""
  pullPolicy: IfNotPresent
  tag: ""

imagePullSecrets: []
#  - name: container-registry-credentials

# use this construction to enable jaeger agent sidecar inject
# https://www.jaegertracing.io/docs/1.25/operator/#manually-defining-jaeger-agent-sidecars
jaegerAgent:
  enabled: false
  namespace: observability
  version: 1.47.0
  image:
    pullPolicy: IfNotPresent
  ports:
    - containerPort: 5775
      name: zk-compact-trft
      protocol: UDP
    - containerPort: 5778
      name: config-rest
      protocol: TCP
    - containerPort: 6831
      name: jg-compact-trft
      protocol: UDP
    - containerPort: 6832
      name: jg-binary-trft
      protocol: UDP
    - containerPort: 14271
      name: admin-http
      protocol: TCP

# Defining deployment type as a Job (deployment must be false)
job: false

jobLimits:
  ttlSecondsAfterFinished: 600
  backoffLimit: 4

initContainers: {}
  # dataCotainer:
  #   # Container launch order, from 0 to 99
  #   order: 10
  #   # resizePolicy controls behavior for in-place resource resize (beta 1.33+).
  #   # Per-resource: choose whether a CPU/memory change can be applied live
  #   # or requires a container restart.
  #   # Empty = default ("NotRequired" for cpu, "RestartContainer" for memory).
