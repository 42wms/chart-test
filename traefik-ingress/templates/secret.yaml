{{- range $keyIngressRoute, $valueIngressRoute := .Values.ingressRoutes }}
{{- with .basicAuthCreds }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "traefik-ingress.name" $ }}-{{ $keyIngressRoute }}-auth-secret
  labels:
    {{- include "traefik-ingress.labels" $ | nindent 4 }}
type: Opaque
data:
  users: |2
    {{- . | nindent 4 }}
{{- end }}
{{- end }}
